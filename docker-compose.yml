services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: geetar-agent:latest
    container_name: geetar-agent-app
    restart: unless-stopped
    # 生产不再向 host 暴露端口：流量从 geetar-nginx 经共享 web 网络进来
    # 本地开发期由 docker-compose.override.yml 临时把 8000 绑到 127.0.0.1
    networks:
      - default      # 内部网络，访问自己的 db/redis
      - web          # 共享网络，让 geetar-nginx 能反代
    environment:
      APP_ENV: ${APP_ENV:-dev}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_FAST_MODEL: ${LLM_FAST_MODEL}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT}
      # 容器内连数据库走 service 名，不是 localhost
      DATABASE_URL: postgresql+asyncpg://geetar:geetar_dev@db:5432/geetar
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    container_name: geetar-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: geetar
      POSTGRES_PASSWORD: geetar_dev
      POSTGRES_DB: geetar
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geetar"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: geetar-agent-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:

networks:
  default:
    driver: bridge
  # 与 geetar 共享的外部网络。生产服务器先执行：
  #   docker network create web
  # 本地开发由 docker-compose.override.yml 覆盖为普通 bridge 网络
  web:
    external: true
    name: web
